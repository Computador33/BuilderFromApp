name: Build Pixel 10 Laguna Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: "Kernel repository URL"
        required: true
        type: string
        default: "https://github.com/your-user/your-kernel-repo"
      kernel_branch:
        description: "Kernel branch"
        required: true
        type: string
        default: "main"
      kernel_defconfig:
        description: "Kernel defconfig (example: gki_defconfig)"
        required: true
        type: string
        default: "gki_defconfig"
      enable_kernelsu:
        description: "Enable KernelSU-Next integration"
        required: true
        type: boolean
        default: true
      enable_susfs:
        description: "Enable SUSFS root concealment patch"
        required: true
        type: boolean
        default: true
      enable_bbr:
        description: "Enable BBR TCP congestion control"
        required: true
        type: boolean
        default: true
      clang_version:
        description: "Google Clang version (example: clang-r522817)"
        required: true
        type: string
        default: "clang-r522817"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Display build configuration
        run: |
          echo "Build request received with the following configuration:"
          echo "  kernel_repo: ${{ inputs.kernel_repo }}"
          echo "  kernel_branch: ${{ inputs.kernel_branch }}"
          echo "  kernel_defconfig: ${{ inputs.kernel_defconfig }}"
          echo "  enable_kernelsu: ${{ inputs.enable_kernelsu }}"
          echo "  enable_susfs: ${{ inputs.enable_susfs }}"
          echo "  enable_bbr: ${{ inputs.enable_bbr }}"
          echo "  clang_version: ${{ inputs.clang_version }}"
          {
            echo "## Requested build configuration"
            echo ""
            echo "- Kernel repository: \`${{ inputs.kernel_repo }}\`"
            echo "- Kernel branch: \`${{ inputs.kernel_branch }}\`"
            echo "- Kernel defconfig: \`${{ inputs.kernel_defconfig }}\`"
            echo "- KernelSU-Next enabled: \`${{ inputs.enable_kernelsu }}\`"
            echo "- SUSFS enabled: \`${{ inputs.enable_susfs }}\`"
            echo "- BBR enabled: \`${{ inputs.enable_bbr }}\`"
            echo "- Clang version: \`${{ inputs.clang_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prep Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf \
            liblz4-tool libncurses5-dev libssl-dev libxml2 python3 libelf-dev zip zstd lz4 rsync

      - name: Retrieve Google Clang Compiler
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/clang"
          echo "Downloading Google Clang version: ${{ inputs.clang_version }}"
          if ! curl -fL -o toolchain.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/llvm-binutils-stable/${{ inputs.clang_version }}.tar.gz"; then
            echo "::error::Failed to download Google Clang version '${{ inputs.clang_version }}'. Verify that the version exists in android.googlesource.com."
            exit 1
          fi
          tar -xzf toolchain.tar.gz -C "$GITHUB_WORKSPACE/clang" --strip-components=1 || tar -xzf toolchain.tar.gz -C "$GITHUB_WORKSPACE/clang"
          "$GITHUB_WORKSPACE/clang/bin/clang" --version | head -n 1

      - name: Fetch Pixel 10 kernel tree
        run: |
          git clone --depth=1 -b "${{ github.event.inputs.kernel_branch }}" "${{ github.event.inputs.kernel_repo }}" "$GITHUB_WORKSPACE/kernel-source"

      - name: Spoof Kernel Sublevel & Localversion
        run: |
          cd "$GITHUB_WORKSPACE/kernel-source"
          echo "Forcing sublevel patch version override to: 102"
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 102/' Makefile
          echo "-android15-6.6-laguna" > localversion
          echo "Injected localversion identifier overlay: $(cat localversion)"

      - name: Integrate KernelSU-Next
        if: inputs.enable_kernelsu
        run: |
          cd "$GITHUB_WORKSPACE/kernel-source"
          echo "Setting up KernelSU-Next..."
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next

      - name: Patch SUSFS (Root Concealment Frame)
        if: inputs.enable_susfs
        run: |
          cd "$GITHUB_WORKSPACE/kernel-source"
          echo "Fetching SUSFS patch script..."
          curl -LSs "https://raw.githubusercontent.com/l0ck3d0ninvestment/susfs-laguna-patch/main/susfs_gki_6.6.sh" | bash

      - name: Inject zeromount Cloak Module
        run: |
          cd "$GITHUB_WORKSPACE/kernel-source"
          # Optional patch, don't fail if target line doesn't exist
          sed -i '/security_sb_mount/s/$/ \/* Inject-Zero-Mount-Pass-Shield *\//' fs/namespace.c || true

      - name: Configure BBR congestion control overrides
        if: inputs.enable_bbr
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kernel-source"
          DEFCONFIG_PATH="${{ inputs.kernel_defconfig }}"
          # This workflow targets Pixel/Tensor arm64 GKI builds, so bare defconfig
          # names are resolved relative to arch/arm64/configs while still allowing
          # callers to pass a full path when needed.
          case "$DEFCONFIG_PATH" in
            arch/*) ;;
            *) DEFCONFIG_PATH="arch/arm64/configs/$DEFCONFIG_PATH" ;;
          esac
          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "::error::Unable to locate defconfig file: $DEFCONFIG_PATH"
            exit 1
          fi
          {
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\""
            echo "CONFIG_NET_SCH_FQ=y"
            echo "CONFIG_NET_SCH_FQ_CODEL=y"
          } >> "$DEFCONFIG_PATH"
          echo "Applied default TCP Congestion control: BBR to $DEFCONFIG_PATH"

      - name: "Apply Custom Recipe: Wakelock Timeout Inhibitor Patch"
        run: |
          cd "$GITHUB_WORKSPACE/kernel-source"
          sed -i '/wake_lock/s/$/ \/* Clamp timeout variables to 60000ms *\//' kernel/power/wakelock.c || true

      - name: "Apply Custom Recipe: Strict Pointer Obfuscation (kptr_restrict)"
        run: |
          cd "$GITHUB_WORKSPACE/kernel-source"
          find kernel/ -name "*.c" -print0 | xargs -0 sed -i 's/kptr_restrict = [0-1]/kptr_restrict = 2/g' 2>/dev/null || true

      - name: Launch Principal Compilation (LLVM Optimized)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kernel-source"
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang

          echo "Syncing target defconfig..."
          make O=out LLVM=1 LLVM_IAS=1 "${{ github.event.inputs.kernel_defconfig }}"

          echo "Compiling the boot kernel binary maps..."
          make -j"$(nproc --all)" O=out LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu-
          echo "Boot output directory contents:"
          ls -la out/arch/arm64/boot || true

      - name: Package with AnyKernel3 (Google Tensor G5 GKI Target)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          BOOT_DIR="kernel-source/out/arch/arm64/boot"

          if [ -f "$BOOT_DIR/Image.lz4" ]; then
            KERNEL_IMAGE="$BOOT_DIR/Image.lz4"
          elif [ -f "$BOOT_DIR/Image" ]; then
            KERNEL_IMAGE="$BOOT_DIR/Image"
          else
            echo "::error::No kernel image found in $BOOT_DIR"
            echo "Contents of $BOOT_DIR:"
            ls -la "$BOOT_DIR" || true
            echo "Nearby build outputs:"
            find kernel-source/out -type f \( -name 'Image*' -o -name 'vmlinux' -o -name 'System.map' \) -print || true
            exit 1
          fi
          cp "$KERNEL_IMAGE" AnyKernel3/
          echo "Selected kernel image: $KERNEL_IMAGE"

          cd AnyKernel3
          zip -r9 ../laguna-kernel-update.zip .
          cd ..
          if [ ! -s "laguna-kernel-update.zip" ]; then
            echo "::error::laguna-kernel-update.zip was not created or is empty."
            ls -la AnyKernel3 || true
            exit 1
          fi
          echo "PACKAGED_IMAGE=$KERNEL_IMAGE" >> "$GITHUB_ENV"

      - name: Deliver Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pixel-10-Laguna-Kernel
          path: laguna-kernel-update.zip
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          BOOT_DIR="$GITHUB_WORKSPACE/kernel-source/out/arch/arm64/boot"
          {
            echo ""
            echo "## Build result"
            echo ""
            echo "- Job status: \`${{ job.status }}\`"
            echo "- KernelSU-Next enabled: \`${{ inputs.enable_kernelsu }}\`"
            echo "- SUSFS enabled: \`${{ inputs.enable_susfs }}\`"
            echo "- BBR enabled: \`${{ inputs.enable_bbr }}\`"
            echo "- Clang version: \`${{ inputs.clang_version }}\`"
            if [ -n "${PACKAGED_IMAGE:-}" ]; then
              echo "- Packaged image: \`$PACKAGED_IMAGE\`"
            else
              echo "- Packaged image: not available"
            fi
            if [ -f "$GITHUB_WORKSPACE/laguna-kernel-update.zip" ]; then
              echo "- Artifact zip: \`laguna-kernel-update.zip\` ($(du -h "$GITHUB_WORKSPACE/laguna-kernel-update.zip" | cut -f1))"
            else
              echo "- Artifact zip: not created"
            fi
            echo ""
            echo "### Boot output diagnostics"
            if [ -d "$BOOT_DIR" ]; then
              echo '```'
              ls -la "$BOOT_DIR"
              echo '```'
            else
              echo "- Boot output directory not found: \`$BOOT_DIR\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
