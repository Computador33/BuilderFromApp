name: Build Kernel

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            cpio \
            dwarves

      - name: Build kernel
  run: |
    set -e
    echo "Repo root: $(pwd)"
    ls -la
    echo "Checking defconfig..."
    test -f arch/arm64/configs/frankel_defconfig
    make O=out ARCH=arm64 frankel_defconfig
    make -j"$(nproc)" O=out ARCH=arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-output
          path: |
            arch/**/boot/*
            vmlinux
            System.map
          if-no-files-found: warn
